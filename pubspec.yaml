name: fks_fan_shop
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_flavorizr: ^2.2.3
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

flavorizr:
  app:
    android:
      flavorDimensions: "flavor-type"
    ios:
      bundleIdPrefix: "com.fksresell"
  flavors:
    dev:
      app:
        name: "FKS Resell Dev"
      android:
        applicationId: "com.fksresell.dev"
      ios:
        bundleId: "com.fksresell.dev"
    prod:
      app:
        name: "FKS Resell"
      android:
        applicationId: "com.fksresell.prod"
      ios:
        bundleId: "com.fksresell.prod"